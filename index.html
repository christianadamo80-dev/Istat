<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcolatore ISTAT Assegno Mantenimento</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
        }
        h1 { font-size: 20px; text-align: center; color: #1a365d; margin-bottom: 25px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-weight: bold; margin-bottom: 6px; font-size: 14px; }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .result-box {
            background-color: #f8fafc;
            border-left: 4px solid #3182ce;
            padding: 15px;
            margin-top: 25px;
            border-radius: 0 6px 6px 0;
        }
        .result-item { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .result-item:last-child { margin-bottom: 0; font-weight: bold; border-top: 1px solid #e2e8f0; padding-top: 10px; }
        .highlight { color: #2b6cb0; font-size: 18px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Calcolo Adeguamento ISTAT</h1>
    
    <div class="form-group">
        <label for="importo">Importo Assegno Attuale (€)</label>
        <input type="number" id="importo" value="500" step="0.01" oninput="calcola()">
    </div>
    
    <div class="form-group">
        <label for="rivalutazione">Percentuale di Rivalutazione</label>
        <select id="rivalutazione" onchange="calcola()">
            <option value="100">100% (Standard)</option>
            <option value="75">75% (Spesso usato in separazioni)</option>
        </select>
    </div>
    
    <div class="form-group">
        <label for="tasso">Tasso di variazione ISTAT (%)</label>
        <input type="number" id="tasso" value="1.2" step="0.1" oninput="calcola()">
    </div>
    
    <div class="result-box">
        <div class="result-item">
            <span>Quota Incremento:</span>
            <span id="res-incremento" class="highlight">€ 6,00</span>
        </div>
        <div class="result-item">
            <span>Nuovo Assegno:</span>
            <span id="res-totale" class="highlight" style="color: #2f855a;">€ 506,00</span>
        </div>
    </div>
</div>

<script>
function calcola() {
    const importo = parseFloat(document.getElementById('importo').value) || 0;
    const rivalutazione = parseFloat(document.getElementById('rivalutazione').value) / 100;
    const tasso = parseFloat(document.getElementById('tasso').value) || 0;
    
    const incremento = importo * (tasso / 100) * rivalutazione;
    const nuovoImporto = importo + incremento;
    
    document.getElementById('res-incremento').innerText = '€ ' + incremento.toLocaleString('it-IT', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    document.getElementById('res-totale').innerText = '€ ' + nuovoImporto.toLocaleString('it-IT', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}
// Esegui il calcolo iniziale all'avvio
calcola();
</script>

</body>
</html>
